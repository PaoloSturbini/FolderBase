name: Bug report
description: Report a reproducible problem in FolderBase
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a problem. Remove personal document names, paths, API keys and sensitive content before submitting.
  - type: input
    id: version
    attributes:
      label: FolderBase version
      placeholder: "1.5.2"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 15.x"
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Mac architecture
      options:
        - Apple Silicon
        - Intel
        - Unknown
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: Explain what happened and what you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Select...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Optional. Remove sensitive content first.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I removed API keys and personal document information.
          required: true
