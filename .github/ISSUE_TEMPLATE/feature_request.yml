name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: Describe the user problem rather than only the desired implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: privacy
    attributes:
      label: Privacy or data-flow implications
      description: Explain whether this could modify files or transmit content externally.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for similar proposals.
          required: true
